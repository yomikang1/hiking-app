<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0a1a12"/>

  <!-- Back mountain (darker) -->
  <polygon points="370,200 470,390 270,390" fill="#065f46"/>

  <!-- Main mountain -->
  <polygon points="180,120 340,390 20,390" fill="#059669"/>

  <!-- Snow / highlight on main peak -->
  <polygon points="180,120 220,200 140,200" fill="#d1fae5" opacity="0.95"/>

  <!-- Trail dot line going up -->
  <circle cx="236" cy="265" r="5" fill="#6ee7b7" opacity="0.7"/>
  <circle cx="218" cy="235" r="4" fill="#6ee7b7" opacity="0.6"/>
  <circle cx="203" cy="208" r="3" fill="#6ee7b7" opacity="0.5"/>

  <!-- 산 text -->
  <text x="380" y="390" font-family="serif" font-size="110" font-weight="bold" fill="#10b981" opacity="0.85" text-anchor="middle">산</text>
</svg>
